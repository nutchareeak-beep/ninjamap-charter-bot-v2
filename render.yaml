services:
  - type: worker
    name: ninjamap-charter-bot
    runtime: node
    plan: starter
    buildCommand: npm install --omit=dev --no-audit --no-fund
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TEST_MODE
        value: "true"
      - key: COACH_ROLE_NAME
        value: Coach
      - key: DATA_DIR
        value: /var/data
    disk:
      name: charter-logs
      mountPath: /var/data
      sizeGB: 1
